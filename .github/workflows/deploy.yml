name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2

# Queue concurrent deploys (don't cancel) so a quick second push doesn't abort
# an in-flight CDK run mid-stack.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      CERT_ARN: ${{ vars.CERT_ARN }}
      GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify

      - uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        id: aws
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # cdk:deploy depends on site:build via Nx, and GITHUB_SHA/GA_MEASUREMENT_ID
      # are declared cache inputs — so the site rebuilds when this commit changes
      # and the build-sha meta tag reflects this exact commit.
      - name: cdk deploy
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: npm run cdk:deploy -- --require-approval never

      - name: smoke test
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: npm run site:smoke
